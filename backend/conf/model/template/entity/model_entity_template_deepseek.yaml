id: 2004 # 模型 entity id, 同 id 数据不会覆盖
name: DeepSeek-V3
description: test deepseek description
meta:
  id: 104
default_parameters:
  -
    name: temperature
    label: 生成随机性
    desc: '- **temperature**: 调高温度会使得模型的输出更多样性和创新性，反之，降低温度会使输出内容更加遵循指令要求但减少多样性。建议不要与“Top p”同时调整。'
    type: float
    min: '0'
    max: '1'
    precision: 1
    default_val:
      default_val: '1.0'
      creative: '1'
      balance: '0.8'
      precise: '0.3'
    style:
      widget: slider
      label: 生成随机性
  -
    name: max_tokens
    label: 最大回复长度
    desc: '控制模型输出的Tokens 长度上限。通常 100 Tokens 约等于 150 个中文汉字。'
    type: int
    min: '1'
    max: '4096'
    precision: 0
    default_val:
      default_val: '4096'
    style:
      widget: slider
      label: 输入及输出设置
  -
    name: response_format
    label: 输出格式
    desc: '- **文本**: 使用普通文本格式回复\n- **JSON**: 将引导模型使用JSON格式输出'
    type: int
    precision: 0
    default_val:
      default_val: '0'
    options:
      -
        value: '0'
        label: 'Text'
      -
        value: '1'
        label: 'JSON Object'
    style:
      widget: radio_buttons
      label: 输入及输出设置


