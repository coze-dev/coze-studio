x-env-file: &env_file
  - .env

services:
  elasticsearch-setup:
    image: alpine/curl:8.12.1
    container_name: coze-elasticsearch-setup
    env_file: *env_file
    profiles: ['middleware']
    volumes:
      - ./volumes/elasticsearch/setup_es.sh:/setup_es.sh
      - ./volumes/elasticsearch/es_index_schema:/es_index_schema
    command:
      - /bin/sh
      - -c
      - |
        set -ex
        /setup_es.sh
        echo 'Elasticsearch setup complete.'
    networks:
      - coze-network
    restart: 'no'
  minio-setup:
    image: minio/mc
    container_name: coze-minio-setup
    env_file: *env_file
    profiles: ['middleware']
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./volumes/minio/default_icon/:/default_icon
    entrypoint: >
      /bin/sh -c  "
        (/usr/bin/mc alias set localminio http://coze-minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} && \
        /usr/bin/mc mb --ignore-existing localminio/opencoze && \
        /usr/bin/mc cp --recursive /default_icon/ localminio/opencoze/default_icon/ && \
        echo 'MinIO setup complete: Files uploaded to opencoze bucket.') || exit 1; \
      "
    networks:
      - coze-network
    restart: 'no'
  mysql-setup-init-sql:
    image: mysql:8.4.5
    container_name: coze-mysql-setup-init-sql
    env_file: *env_file
    profiles: ['middleware']
    command:
      - /bin/sh
      - -c
      - |
        set -ex
        for i in $(seq 1 60); do
          DB_HOST="$${MYSQL_HOST}"
          if [ "$${MYSQL_HOST}" = "localhost" ] || [ "$${MYSQL_HOST}" = "127.0.0.1" ]; then
            DB_HOST="mysql"
          fi
          if mysql -h "$${DB_HOST}" -P"$${MYSQL_PORT}" -u"$${MYSQL_USER}" -p"$${MYSQL_PASSWORD}" "$${MYSQL_DATABASE}" < /schema.sql && \
             mysql -h "$${DB_HOST}" -P"$${MYSQL_PORT}" -u"$${MYSQL_USER}" -p"$${MYSQL_PASSWORD}" "$${MYSQL_DATABASE}" < /sql_init.sql; then
            echo 'MySQL init success.'
            exit 0
          fi
          echo "Retrying to connect to mysql... ($$i/60)"
          sleep 1
        done
        echo 'Failed to init mysql db.'
        exit 1
    volumes:
      - ./volumes/mysql/sql_init.sql:/sql_init.sql
      - ./volumes/mysql/schema.sql:/schema.sql
    networks:
      - coze-network

  coze-server:
    # build:
    #   c6ntext: ../
    #   dockerfile: backend/Dockerfile
    image: fanlv/opencoze:0.1.0
    container_name: coze-server
    profiles: ['run-server']
    env_file: *env_file
    environment:
      LISTEN_ADDR: 0.0.0.0:8888
    networks:
      - coze-network
    ports:
      - '8888:8888'
    volumes:
      - ../docker/.env:/app/.env
      - ../backend/conf:/app/resources/conf
      # - ../backend/static:/app/resources/static
    depends_on:
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      elasticsearch-setup:
        condition: service_completed_successfully
      mysql-setup-init-sql:
        condition: service_completed_successfully
    command: ['/app/bootstrap.sh']
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 4G
networks:
  coze-network:
    driver: bridge
